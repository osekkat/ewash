<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ewash · Mobile app</title>
<link rel="stylesheet" href="styles.css" />

<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#1FA9A9" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ewash" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- App-wide data (TARIFFs etc. defined in screens.jsx; booking imports them) -->
<script src="i18n.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="booking.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
        .catch((err) => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
